<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Azteca — Dashboard</title>
  <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
  <div class="header">
    <h1>CRM Azteca</h1>
    <div class="meta">
      <span id="persona-name"></span>
      <span id="role-badge" class="role-badge"></span>
      <span id="last-refresh"></span>
      <button id="refresh-btn" onclick="loadAll()">Actualizar</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="dashboard">
    <!-- Pipeline Overview -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Pipeline</h2>
        <span id="pipeline-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="stats" id="pipeline-stats"></div>
        <div id="pipeline-funnel"></div>
      </div>
    </div>

    <!-- Cuota por equipo -->
    <div class="card">
      <div class="card-header">
        <h2>Cuota del Equipo</h2>
      </div>
      <div class="card-body" id="cuota-body">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- Deals en riesgo -->
    <div class="card">
      <div class="card-header">
        <h2>Deals en Riesgo</h2>
        <span id="risk-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="table-wrap" id="risk-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- Actividad reciente -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Actividad Reciente</h2>
      </div>
      <div class="card-body">
        <div class="table-wrap" id="activity-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- Alertas -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Alertas (7 dias)</h2>
        <span id="alert-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="table-wrap" id="alerts-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, formatMoney, formatPct, quotaColor, quotaClass, sentimentColor, getToken, clearToken, $, el, timeAgo } from '/dashboard/shared.js';

    window.logout = () => { clearToken(); window.location.href = '/dashboard/index.html'; };

    const token = getToken();
    if (!token) window.location.href = '/dashboard/index.html';

    // Decode JWT payload to show persona info
    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      $('#role-badge').textContent = payload.rol.toUpperCase();
    } catch {}

    // --- Load equipo to get persona name ---
    async function loadPersona() {
      try {
        const data = await api('/api/v1/equipo');
        const me = data.personas.find(p => p.rol === 'vp') || data.personas[0];
        if (me) $('#persona-name').textContent = me.nombre;
      } catch {}
    }

    // --- Pipeline ---
    async function loadPipeline() {
      try {
        const data = await api('/api/v1/pipeline');
        const stats = $('#pipeline-stats');
        const megaCount = data.propuestas.filter(p => p.es_mega).length;
        const stalledCount = data.propuestas.filter(p => p.dias_sin_actividad >= 7).length;

        stats.innerHTML = '';
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: String(data.total_propuestas) }),
          el('div', { className: 'stat-label', textContent: 'Propuestas' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: formatMoney(data.valor_total) }),
          el('div', { className: 'stat-label', textContent: 'Valor Total' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: `stat-value ${megaCount > 0 ? 'val-warning' : ''}`, textContent: String(megaCount) }),
          el('div', { className: 'stat-label', textContent: 'Mega-Deals' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: `stat-value ${stalledCount > 0 ? 'val-danger' : 'val-positive'}`, textContent: String(stalledCount) }),
          el('div', { className: 'stat-label', textContent: 'Estancadas' }),
        ]));

        // Funnel by stage
        const stages = ['en_preparacion', 'enviada', 'en_discusion', 'en_negociacion', 'confirmada_verbal', 'orden_recibida', 'en_ejecucion'];
        const stageCounts = {};
        const stageValues = {};
        for (const s of stages) { stageCounts[s] = 0; stageValues[s] = 0; }
        for (const p of data.propuestas) {
          if (stages.includes(p.etapa)) {
            stageCounts[p.etapa]++;
            stageValues[p.etapa] += p.valor || 0;
          }
        }

        const funnel = $('#pipeline-funnel');
        funnel.innerHTML = '';
        const maxVal = Math.max(...Object.values(stageValues), 1);

        for (const s of stages) {
          if (stageCounts[s] === 0) continue;
          const pct = (stageValues[s] / maxVal) * 100;
          const row = el('div', { style: 'display:flex;align-items:center;gap:8px;margin-bottom:4px;' }, [
            el('div', { style: 'width:120px;font-size:11px;color:var(--gray-500);text-align:right;', textContent: s.replace(/_/g, ' ') }),
            el('div', { style: 'flex:1;height:24px;background:var(--gray-100);border-radius:4px;overflow:hidden;' }, [
              el('div', { style: `width:${Math.max(pct, 2)}%;height:100%;background:var(--blue);border-radius:4px;` }),
            ]),
            el('div', { style: 'width:100px;font-size:12px;font-family:var(--font-mono);', textContent: `${stageCounts[s]} · ${formatMoney(stageValues[s])}` }),
          ]);
          funnel.appendChild(row);
        }

        $('#pipeline-count').textContent = `${data.total_propuestas} propuestas`;
      } catch (err) {
        $('#pipeline-stats').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Cuota ---
    async function loadCuota() {
      try {
        const data = await api('/api/v1/cuota');
        const body = $('#cuota-body');
        body.innerHTML = '';

        if (data.cuotas.length === 0) {
          body.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin datos de cuota</div>';
          return;
        }

        for (const q of data.cuotas) {
          const pct = q.porcentaje;
          const bar = el('div', { style: 'margin-bottom:8px;' }, [
            el('div', { style: 'display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px;' }, [
              el('span', { textContent: `${q.nombre} (${q.rol})` }),
              el('span', { className: quotaClass(pct), style: 'font-family:var(--font-mono);font-weight:600;', textContent: formatPct(pct) }),
            ]),
            el('div', { style: 'height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden;' }, [
              el('div', { style: `width:${Math.min(pct, 100)}%;height:100%;background:${quotaColor(pct)};border-radius:4px;transition:width 0.5s;` }),
            ]),
            el('div', { style: 'display:flex;justify-content:space-between;font-size:11px;color:var(--gray-500);margin-top:1px;' }, [
              el('span', { textContent: `Meta: ${formatMoney(q.meta)}` }),
              el('span', { textContent: `Logro: ${formatMoney(q.logro)}` }),
            ]),
          ]);
          body.appendChild(bar);
        }
      } catch (err) {
        $('#cuota-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- At-risk deals ---
    async function loadRisk() {
      try {
        const data = await api('/api/v1/pipeline', { solo_estancadas: 'true' });
        const wrap = $('#risk-table');
        wrap.innerHTML = '';

        if (data.propuestas.length === 0) {
          wrap.innerHTML = '<div class="val-positive" style="text-align:center;padding:20px;">Sin deals estancados</div>';
          $('#risk-count').textContent = '0';
          return;
        }

        $('#risk-count').textContent = String(data.propuestas.length);

        const table = el('table');
        table.appendChild(el('thead', {}, [
          el('tr', {}, [
            el('th', { textContent: 'Deal' }),
            el('th', { textContent: 'Cuenta' }),
            el('th', { textContent: 'Valor' }),
            el('th', { textContent: 'Etapa' }),
            el('th', { textContent: 'Dias' }),
            el('th', { textContent: 'AE' }),
          ]),
        ]));

        const tbody = el('tbody');
        for (const p of data.propuestas.slice(0, 15)) {
          const tr = el('tr', {}, [
            el('td', {}, [
              document.createTextNode(p.titulo),
              p.es_mega ? el('span', { className: 'tag tag-mega', textContent: 'MEGA', style: 'margin-left:6px;' }) : null,
            ].filter(Boolean)),
            el('td', { textContent: p.cuenta || '-' }),
            el('td', { style: 'font-family:var(--font-mono);', textContent: formatMoney(p.valor) }),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: p.etapa?.replace(/_/g, ' ') || '-' })]),
            el('td', { className: p.dias_sin_actividad >= 14 ? 'val-danger' : 'val-warning', style: 'font-weight:600;', textContent: String(p.dias_sin_actividad || 0) }),
            el('td', { textContent: p.ejecutivo || '-' }),
          ]);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#risk-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Activity ---
    async function loadActivity() {
      try {
        const data = await api('/api/v1/actividades', { limite: '30' });
        const wrap = $('#activity-table');
        wrap.innerHTML = '';

        if (data.actividades.length === 0) {
          wrap.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin actividades recientes</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [
          el('tr', {}, [
            el('th', { textContent: '' }),
            el('th', { textContent: 'Tipo' }),
            el('th', { textContent: 'Resumen' }),
            el('th', { textContent: 'Cuenta' }),
            el('th', { textContent: 'AE' }),
            el('th', { textContent: 'Fecha' }),
          ]),
        ]));

        const tbody = el('tbody');
        for (const a of data.actividades) {
          const tr = el('tr', {}, [
            el('td', {}, [el('span', { className: `dot dot-${a.sentimiento || 'neutral'}` })]),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: a.tipo || '-' })]),
            el('td', { textContent: a.resumen || '-', style: 'max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;' }),
            el('td', { textContent: a.cuenta || '-' }),
            el('td', { textContent: a.ejecutivo || '-' }),
            el('td', { style: 'font-size:12px;color:var(--gray-500);white-space:nowrap;', textContent: timeAgo(a.fecha) }),
          ]);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#activity-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Alerts ---
    async function loadAlerts() {
      try {
        const data = await api('/api/v1/alertas', { dias: '7' });
        const wrap = $('#alerts-table');
        wrap.innerHTML = '';
        $('#alert-count').textContent = String(data.total);

        if (data.alertas.length === 0) {
          wrap.innerHTML = '<div class="val-positive" style="text-align:center;padding:20px;">Sin alertas recientes</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [
          el('tr', {}, [
            el('th', { textContent: 'Tipo' }),
            el('th', { textContent: 'Grupo' }),
            el('th', { textContent: 'Fecha' }),
          ]),
        ]));

        const tbody = el('tbody');
        for (const a of data.alertas) {
          const tr = el('tr', {}, [
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: a.tipo || '-' })]),
            el('td', { textContent: a.grupo_destino || '-' }),
            el('td', { style: 'font-size:12px;color:var(--gray-500);', textContent: timeAgo(a.fecha) }),
          ]);
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#alerts-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Load all ---
    window.loadAll = async function() {
      $('#last-refresh').textContent = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      await Promise.all([loadPersona(), loadPipeline(), loadCuota(), loadRisk(), loadActivity(), loadAlerts()]);
    };

    // Initial load + auto-refresh every 60s
    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
