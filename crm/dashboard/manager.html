<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Azteca — Manager Dashboard</title>
  <link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>
  <div class="header">
    <h1>CRM Azteca</h1>
    <div class="meta">
      <span id="persona-name"></span>
      <span id="role-badge" class="role-badge"></span>
      <span id="last-refresh"></span>
      <button onclick="loadAll()">Actualizar</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="dashboard">
    <!-- Ejecutivo cards -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Mi Equipo</h2>
      </div>
      <div class="card-body" id="team-cards">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- Pipeline -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Pipeline del Equipo</h2>
        <span id="pipeline-count" class="val-neutral"></span>
      </div>
      <div class="card-body">
        <div class="stats" id="pipeline-stats"></div>
        <div class="table-wrap" id="pipeline-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>

    <!-- Descarga -->
    <div class="card">
      <div class="card-header">
        <h2>Descarga Semanal</h2>
      </div>
      <div class="card-body" id="descarga-body">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- Coaching signals -->
    <div class="card">
      <div class="card-header">
        <h2>Coaching</h2>
      </div>
      <div class="card-body" id="coaching-body">
        <div class="loading">Cargando...</div>
      </div>
    </div>

    <!-- Activity -->
    <div class="card card-full">
      <div class="card-header">
        <h2>Actividad Reciente</h2>
      </div>
      <div class="card-body">
        <div class="table-wrap" id="activity-table">
          <div class="loading">Cargando...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { api, formatMoney, formatPct, quotaColor, quotaClass, getToken, clearToken, $, el, timeAgo } from '/dashboard/shared.js';

    window.logout = () => { clearToken(); window.location.href = '/dashboard/index.html'; };

    const token = getToken();
    if (!token) window.location.href = '/dashboard/index.html';

    try {
      const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      $('#role-badge').textContent = payload.rol.toUpperCase();
    } catch {}

    // --- Team cards: one card per AE with quota, active deals, activity ---
    async function loadTeam() {
      try {
        const [equipo, cuota, pipeline, actividades] = await Promise.all([
          api('/api/v1/equipo'),
          api('/api/v1/cuota'),
          api('/api/v1/pipeline'),
          api('/api/v1/actividades', { limite: '100' }),
        ]);

        const me = equipo.personas.find(p => p.rol === 'gerente') || equipo.personas[0];
        if (me) $('#persona-name').textContent = me.nombre;

        const aes = equipo.personas.filter(p => p.rol === 'ae');
        const container = $('#team-cards');
        container.innerHTML = '';

        if (aes.length === 0) {
          container.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin ejecutivos en el equipo</div>';
          return;
        }

        const grid = el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;' });

        for (const ae of aes) {
          const q = cuota.cuotas.find(c => c.nombre === ae.nombre);
          const deals = pipeline.propuestas.filter(p => p.ejecutivo === ae.nombre);
          const acts = actividades.actividades.filter(a => a.ejecutivo === ae.nombre);
          const lastActivity = acts.length > 0 ? acts[0].fecha : null;
          const negCount = acts.filter(a => a.sentimiento === 'negativo').length;
          const stalledDeals = deals.filter(d => d.dias_sin_actividad >= 7).length;

          const card = el('div', { style: 'border:1px solid var(--gray-200);border-radius:8px;padding:12px;' }, [
            el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;' }, [
              el('strong', { textContent: ae.nombre, style: 'font-size:14px;' }),
              q ? el('span', { className: quotaClass(q.porcentaje), style: 'font-family:var(--font-mono);font-weight:700;font-size:18px;', textContent: formatPct(q.porcentaje) })
                : el('span', { className: 'val-neutral', textContent: '-' }),
            ]),
            q ? el('div', { style: 'height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;margin-bottom:8px;' }, [
              el('div', { style: `width:${Math.min(q.porcentaje, 100)}%;height:100%;background:${quotaColor(q.porcentaje)};border-radius:3px;` }),
            ]) : null,
            el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;color:var(--gray-500);' }, [
              el('span', { textContent: `${deals.length} deals activos` }),
              el('span', { textContent: `${formatMoney(deals.reduce((s, d) => s + (d.valor || 0), 0))} pipeline` }),
              stalledDeals > 0
                ? el('span', { className: 'val-danger', textContent: `${stalledDeals} estancadas` })
                : el('span', { className: 'val-positive', textContent: '0 estancadas' }),
              negCount > 0
                ? el('span', { className: 'val-danger', textContent: `${negCount} negativos` })
                : el('span', { textContent: `${negCount} negativos` }),
              el('span', { textContent: `Ult. act: ${timeAgo(lastActivity)}` }),
            ].filter(Boolean)),
          ]);
          grid.appendChild(card);
        }
        container.appendChild(grid);
      } catch (err) {
        $('#team-cards').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Pipeline table ---
    async function loadPipeline() {
      try {
        const data = await api('/api/v1/pipeline');
        const stats = $('#pipeline-stats');
        stats.innerHTML = '';

        const megaCount = data.propuestas.filter(p => p.es_mega).length;
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: String(data.total_propuestas) }),
          el('div', { className: 'stat-label', textContent: 'Propuestas' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: formatMoney(data.valor_total) }),
          el('div', { className: 'stat-label', textContent: 'Valor Total' }),
        ]));
        stats.appendChild(el('div', { className: 'stat' }, [
          el('div', { className: 'stat-value', textContent: String(megaCount) }),
          el('div', { className: 'stat-label', textContent: 'Mega-Deals' }),
        ]));

        $('#pipeline-count').textContent = `${data.total_propuestas} propuestas`;
        const wrap = $('#pipeline-table');
        wrap.innerHTML = '';

        if (data.propuestas.length === 0) {
          wrap.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Pipeline vacio</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [el('tr', {}, [
          el('th', { textContent: 'Deal' }),
          el('th', { textContent: 'Cuenta' }),
          el('th', { textContent: 'Valor' }),
          el('th', { textContent: 'Etapa' }),
          el('th', { textContent: 'Dias' }),
          el('th', { textContent: 'AE' }),
        ])]));

        const tbody = el('tbody');
        for (const p of data.propuestas) {
          tbody.appendChild(el('tr', {}, [
            el('td', {}, [
              document.createTextNode(p.titulo),
              p.es_mega ? el('span', { className: 'tag tag-mega', textContent: 'MEGA', style: 'margin-left:6px;' }) : null,
            ].filter(Boolean)),
            el('td', { textContent: p.cuenta || '-' }),
            el('td', { style: 'font-family:var(--font-mono);', textContent: formatMoney(p.valor) }),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: p.etapa?.replace(/_/g, ' ') || '-' })]),
            el('td', { className: (p.dias_sin_actividad || 0) >= 7 ? 'val-danger' : '', style: 'font-weight:600;', textContent: String(p.dias_sin_actividad || 0) }),
            el('td', { textContent: p.ejecutivo || '-' }),
          ]));
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#pipeline-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Descarga ---
    async function loadDescarga() {
      try {
        const data = await api('/api/v1/descarga');
        const body = $('#descarga-body');
        body.innerHTML = '';

        if (data.cuentas.length === 0) {
          body.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin datos de descarga</div>';
          return;
        }

        // Summary
        const gapPct = data.total_planificado > 0 ? ((data.gap_total / data.total_planificado) * 100).toFixed(1) : '0';
        body.appendChild(el('div', { style: 'display:flex;gap:16px;margin-bottom:12px;' }, [
          el('div', { className: 'stat' }, [
            el('div', { className: 'stat-value', textContent: formatMoney(data.total_facturado) }),
            el('div', { className: 'stat-label', textContent: 'Facturado' }),
          ]),
          el('div', { className: 'stat' }, [
            el('div', { className: 'stat-value', textContent: formatMoney(data.total_planificado) }),
            el('div', { className: 'stat-label', textContent: 'Planificado' }),
          ]),
          el('div', { className: 'stat' }, [
            el('div', { className: `stat-value ${data.gap_total > 0 ? 'val-danger' : 'val-positive'}`, textContent: formatMoney(data.gap_total) }),
            el('div', { className: 'stat-label', textContent: `Gap (${gapPct}%)` }),
          ]),
        ]));

        // Per-account bars
        for (const c of data.cuentas) {
          const pct = c.planificado > 0 ? (c.facturado / c.planificado) * 100 : 0;
          body.appendChild(el('div', { style: 'margin-bottom:6px;' }, [
            el('div', { style: 'display:flex;justify-content:space-between;font-size:12px;margin-bottom:1px;' }, [
              el('span', { textContent: c.cuenta }),
              el('span', { style: 'font-family:var(--font-mono);', textContent: `${formatMoney(c.facturado)} / ${formatMoney(c.planificado)}` }),
            ]),
            el('div', { style: 'height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden;' }, [
              el('div', { style: `width:${Math.min(pct, 100)}%;height:100%;background:${quotaColor(pct)};border-radius:3px;` }),
            ]),
          ]));
        }
      } catch (err) {
        $('#descarga-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Coaching signals ---
    async function loadCoaching() {
      try {
        const [pipeline, actividades] = await Promise.all([
          api('/api/v1/pipeline'),
          api('/api/v1/actividades', { limite: '100' }),
        ]);

        const body = $('#coaching-body');
        body.innerHTML = '';
        const signals = [];

        // Stalled mega-deals
        const stalledMega = pipeline.propuestas.filter(p => p.es_mega && p.dias_sin_actividad >= 7);
        if (stalledMega.length > 0) {
          signals.push({ severity: 'danger', text: `${stalledMega.length} mega-deal(s) estancados: ${stalledMega.map(p => p.titulo).join(', ')}` });
        }

        // Negative sentiment streak
        const negActs = actividades.actividades.filter(a => a.sentimiento === 'negativo');
        if (negActs.length >= 3) {
          signals.push({ severity: 'warning', text: `${negActs.length} actividades negativas recientes` });
        }

        // AEs with no recent activity
        const equipo = await api('/api/v1/equipo');
        const aes = equipo.personas.filter(p => p.rol === 'ae');
        for (const ae of aes) {
          const aeActs = actividades.actividades.filter(a => a.ejecutivo === ae.nombre);
          if (aeActs.length === 0) {
            signals.push({ severity: 'warning', text: `${ae.nombre}: sin actividad reciente` });
          }
        }

        if (signals.length === 0) {
          body.innerHTML = '<div class="val-positive" style="text-align:center;padding:20px;">Sin señales de coaching</div>';
          return;
        }

        for (const s of signals) {
          body.appendChild(el('div', {
            style: `padding:8px 12px;border-radius:6px;margin-bottom:6px;font-size:13px;
              background:${s.severity === 'danger' ? '#fef2f2' : '#fffbeb'};
              border-left:3px solid ${s.severity === 'danger' ? 'var(--red)' : 'var(--yellow)'};`,
            textContent: s.text,
          }));
        }
      } catch (err) {
        $('#coaching-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    // --- Activity table ---
    async function loadActivity() {
      try {
        const data = await api('/api/v1/actividades', { limite: '20' });
        const wrap = $('#activity-table');
        wrap.innerHTML = '';

        if (data.actividades.length === 0) {
          wrap.innerHTML = '<div class="val-neutral" style="text-align:center;padding:20px;">Sin actividades</div>';
          return;
        }

        const table = el('table');
        table.appendChild(el('thead', {}, [el('tr', {}, [
          el('th', { textContent: '' }),
          el('th', { textContent: 'Tipo' }),
          el('th', { textContent: 'Resumen' }),
          el('th', { textContent: 'Cuenta' }),
          el('th', { textContent: 'AE' }),
          el('th', { textContent: 'Fecha' }),
        ])]));

        const tbody = el('tbody');
        for (const a of data.actividades) {
          tbody.appendChild(el('tr', {}, [
            el('td', {}, [el('span', { className: `dot dot-${a.sentimiento || 'neutral'}` })]),
            el('td', {}, [el('span', { className: 'tag tag-stage', textContent: a.tipo || '-' })]),
            el('td', { textContent: a.resumen || '-', style: 'max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;' }),
            el('td', { textContent: a.cuenta || '-' }),
            el('td', { textContent: a.ejecutivo || '-' }),
            el('td', { style: 'font-size:12px;color:var(--gray-500);white-space:nowrap;', textContent: timeAgo(a.fecha) }),
          ]));
        }
        table.appendChild(tbody);
        wrap.appendChild(table);
      } catch (err) {
        $('#activity-table').innerHTML = `<div class="error-msg">${err.message}</div>`;
      }
    }

    window.loadAll = async function() {
      $('#last-refresh').textContent = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
      await Promise.all([loadTeam(), loadPipeline(), loadDescarga(), loadCoaching(), loadActivity()]);
    };

    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
