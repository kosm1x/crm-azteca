name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            engine/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install engine deps
        run: npm ci
        working-directory: engine

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
